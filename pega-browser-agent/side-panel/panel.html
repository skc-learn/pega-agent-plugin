<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pega Co-Pilot</title>
  <style>
    :root {
      --primary-color: #0078d4;
      --primary-hover: #106ebe;
      --danger-color: #d13438;
      --success-color: #107c10;
      --warning-color: #ffb900;
      --bg-color: #ffffff;
      --bg-secondary: #f3f2f1;
      --bg-dark: #1b1b1b;
      --text-primary: #1b1b1b;
      --text-secondary: #605e5c;
      --border-color: #edebe9;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-primary);
      background: var(--bg-color);
      width: 380px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: var(--bg-dark);
      color: white;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 16px;
    }

    .header-icon {
      font-size: 20px;
    }

    .settings-btn {
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      font-size: 18px;
    }

    .settings-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Main content */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Loading state */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: var(--text-secondary);
    }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--border-color);
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Not detected state */
    .not-detected {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .not-detected-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    /* Summary Card */
    .card {
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      background: var(--bg-secondary);
      padding: 12px 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .card-header:hover {
      background: #e1dfdd;
    }

    .card-header-icon {
      font-size: 16px;
    }

    .card-header-chevron {
      margin-left: auto;
      transition: transform 0.2s;
    }

    .card-header.collapsed .card-header-chevron {
      transform: rotate(-90deg);
    }

    .card-content {
      padding: 16px;
    }

    .card-content.collapsed {
      display: none;
    }

    /* Summary sections */
    .summary-section {
      margin-bottom: 16px;
    }

    .summary-section:last-child {
      margin-bottom: 0;
    }

    .summary-label {
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .summary-text {
      color: var(--text-primary);
      line-height: 1.6;
    }

    .risk-signal {
      background: #fff4ce;
      border-left: 3px solid var(--warning-color);
      padding: 12px;
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    .risk-signal.critical {
      background: #fde7e9;
      border-left-color: var(--danger-color);
    }

    /* Feedback buttons */
    .feedback {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--border-color);
      margin-top: 12px;
    }

    .feedback-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .feedback-btn:hover {
      background: var(--bg-secondary);
    }

    .feedback-btn.selected {
      background: var(--primary-color);
      color: white;
      border-color: var(--primary-color);
    }

    /* Action Plan Card */
    .action-plan {
      border-left: 3px solid var(--primary-color);
    }

    .action-plan-steps {
      list-style: none;
      margin: 12px 0;
    }

    .action-plan-step {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .action-plan-step:last-child {
      border-bottom: none;
    }

    .step-number {
      background: var(--primary-color);
      color: white;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .step-text {
      flex: 1;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--primary-color);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background: var(--bg-secondary);
    }

    /* Activity Log */
    .activity-log {
      list-style: none;
      max-height: 200px;
      overflow-y: auto;
    }

    .activity-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-color);
      font-size: 13px;
    }

    .activity-item:last-child {
      border-bottom: none;
    }

    .activity-icon {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      margin-top: 2px;
    }

    .activity-icon.success {
      background: var(--success-color);
      color: white;
    }

    .activity-icon.error {
      background: var(--danger-color);
      color: white;
    }

    .activity-icon.info {
      background: var(--primary-color);
      color: white;
    }

    .activity-time {
      color: var(--text-secondary);
      font-size: 11px;
      margin-left: auto;
      flex-shrink: 0;
    }

    /* Command Input */
    .command-input-container {
      padding: 16px;
      background: var(--bg-color);
      border-top: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .command-input-wrapper {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .command-input {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      font-size: 14px;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      font-family: inherit;
    }

    .command-input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 1px var(--primary-color);
    }

    .command-input::placeholder {
      color: var(--text-secondary);
    }

    .send-btn {
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 12px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 16px;
    }

    .send-btn:hover {
      background: var(--primary-hover);
    }

    .send-btn:disabled {
      background: var(--border-color);
      cursor: not-allowed;
    }

    /* Error message */
    .error-message {
      background: #fde7e9;
      border: 1px solid var(--danger-color);
      color: var(--danger-color);
      padding: 12px;
      border-radius: var(--radius);
      margin-bottom: 16px;
    }

    /* Placeholder examples */
    .examples {
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .example-link {
      color: var(--primary-color);
      cursor: pointer;
      text-decoration: underline;
    }

    .example-link:hover {
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">
      <span class="header-icon">🤖</span>
      <span>Pega Co-Pilot</span>
    </div>
    <button class="settings-btn" id="settingsBtn" title="Settings">⚙️</button>
  </div>

  <div class="main" id="main">
    <!-- Content will be dynamically inserted here -->
    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <span>Connecting...</span>
    </div>
  </div>

  <div class="command-input-container">
    <div class="command-input-wrapper">
      <textarea
        class="command-input"
        id="commandInput"
        placeholder="What would you like to do?"
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn" title="Send command">→</button>
    </div>
    <div class="examples">
      Try: <span class="example-link" data-command="Summarize this case">Summarize this case</span> |
      <span class="example-link" data-command="Update the status">Update the status</span> |
      <span class="example-link" data-command="What's next?">What's next?</span>
    </div>
  </div>

  <script src="panel.js" type="module"></script>
</body>
</html>
