<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pega Case - Classic UI</title>
  <style>
    * { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    body {
      background: #f0f0f0;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      font-family: Arial, sans-serif;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a365d9,100%, #fff);
      color: white;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      margin: 0;
      font-size: 18px;
    }

    /* Main Content */
    .main-content {
      padding: 20px;
    }

    /* Case Header */
    .case-header {
      background: white;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .case-id {
      font-size: 24px;
      font-weight: 600;
      color: #1a365d9;
    }

    .case-type {
      color: #666;
      font-size: 14px;
    }

    .case-status {
      display: inline-block;
      padding: 4px 8px;
      background: #e0e0e0;
      border-radius: 4px;
      font-size: 11px;
      margin-left: 10px;
    }

    /* Form */
    .form-container {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .form-row {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    .form-group {
      flex: 1;
      min-width: 200px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      color: #666;
      margin-bottom: 5px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 8px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
    }

    /* Buttons */
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      padding: 8px 16px;
      background: #1a365d9;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    /* Navigation */
    .nav-links {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .nav-link {
      padding: 8px 12px;
      background: #f5f5f5;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    /* Status */
    .status-bar {
      background: #e8f4e8;
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4caf50;
    }

    /* Pega-specific classes */
    .harness-body {
      background: white;
      padding: 15px;
    }

    .pega-ui-form {
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 15px;
    }

    .rule-ui-body {
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <h1>Case Management</h1>
  </header>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-indicator"></div>
    <span>Status: Open - <span class="case-id" data-test-id="case-id">CASE-DEF-456</span></span>
  </div>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Case Header -->
    <div class="case-header">
      <span class="case-id" data-case-id="case-id">CASE-DEF-456</span>
      <span class="case-type">Service Request</span>
      <span class="case-status">Open</span>
    </div>

    <!-- Form -->
    <div class="form-container">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" data-test-id="Field_FirstName" value="John" aria-label="First Name">
        </div>

        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" data-test-id="Field_LastName" value="Doe" aria-label="Last Name">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" data-test-id="Field_Email" value="john.doe@example.com" aria-label="Email">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" data-test-id="Field_Phone" value="(555) 123-4567" aria-label="Phone">
        </div>

        <div class="form-group">
          <label for="ssn">SSN</label>
          <input type="text" id="ssn" data-test-id="Field_SSN" value="123-45-6789" aria-label="Social Security Number">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" data-test-id="Field_Description" aria-label="Description"></textarea>
        </div>
      </div>

      <!-- Button Group -->
      <div class="button-group">
        <button class="btn" data-test-id="Action_Submit" data-action="submit">Submit</button>
        <button class="btn btn-secondary" data-test-id="Action_Save" data-action="save">Save Draft</button>
        <button class="btn btn-secondary" data-test-id="Action_Next" data-action="next">Next</button>
      </div>

      <!-- Navigation -->
      <div class="nav-links">
        <button class="nav-link" data-test-id="Nav_Previous">Previous</button>
        <button class="nav-link" data-test-id="Nav_Next">Next</button>
      </div>
    </div>
  </div>

  <!-- Pega UI Container (Classic) -->
  <div class="harness-body">
    <div class="pega-ui-form">
      <h2>Additional Information</h2>
      <p>This form contains additional details for the case.</p>
    </div>
  </div>
</body>
</html>
