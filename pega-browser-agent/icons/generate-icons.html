<!DOCTYPE html>
<html>
<head>
  <title>Generate Icons</title>
  <style>
    body { font-family: system-ui; padding: 20px; }
    canvas { border: 1px solid #ccc; margin: 10px; }
    .icons { display: flex; flex-wrap: wrap; gap: 20px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Pega Co-Pilot Icon Generator</h1>
  <p>Click "Generate & Download" to create all icon sizes.</p>

  <div class="icons">
    <div>
      <h3>16x16</h3>
      <canvas id="icon16" width="16" height="16"></canvas>
    </div>
    <div>
      <h3>32x32</h3>
      <canvas id="icon32" width="32" height="32"></canvas>
    </div>
    <div>
      <h3>48x48</h3>
      <canvas id="icon48" width="48" height="48"></canvas>
    </div>
    <div>
      <h3>128x128</h3>
      <canvas id="icon128" width="128" height="128"></canvas>
    </div>
  </div>

  <button onclick="downloadAll()">Generate & Download All Icons</button>

  <script>
    function drawIcon(canvas) {
      const ctx = canvas.getContext('2d');
      const size = canvas.width;
      const scale = size / 128;

      // Background
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#0078d4');
      gradient.addColorStop(1, '#106ebe');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(size/2, size/2, size * 0.47, 0, Math.PI * 2);
      ctx.fill();

      // Robot head
      ctx.fillStyle = 'white';
      roundRect(ctx, size * 0.25, size * 0.22, size * 0.5, size * 0.4, size * 0.06);

      // Eyes
      ctx.fillStyle = '#0078d4';
      ctx.beginPath();
      ctx.arc(size * 0.375, size * 0.40, size * 0.062, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(size * 0.625, size * 0.40, size * 0.062, 0, Math.PI * 2);
      ctx.fill();

      // Pupils
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(size * 0.375, size * 0.40, size * 0.025, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(size * 0.625, size * 0.40, size * 0.025, 0, Math.PI * 2);
      ctx.fill();

      // Mouth
      ctx.fillStyle = '#0078d4';
      roundRect(ctx, size * 0.34, size * 0.53, size * 0.32, size * 0.04, size * 0.02);

      // Antenna
      ctx.fillStyle = 'white';
      roundRect(ctx, size * 0.47, size * 0.12, size * 0.06, size * 0.12, size * 0.02);
      ctx.fillStyle = '#ffb900';
      ctx.beginPath();
      ctx.arc(size * 0.5, size * 0.11, size * 0.047, 0, Math.PI * 2);
      ctx.fill();

      // Body indicator
      ctx.fillStyle = 'white';
      roundRect(ctx, size * 0.375, size * 0.66, size * 0.25, size * 0.16, size * 0.03);
      ctx.fillStyle = '#107c10';
      ctx.beginPath();
      ctx.arc(size * 0.5, size * 0.735, size * 0.047, 0, Math.PI * 2);
      ctx.fill();
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
      ctx.fill();
    }

    function downloadAll() {
      const sizes = [16, 32, 48, 128];
      sizes.forEach(size => {
        const canvas = document.getElementById('icon' + size);
        drawIcon(canvas);

        const link = document.createElement('a');
        link.download = 'icon' + size + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }

    // Draw on page load
    [16, 32, 48, 128].forEach(size => {
      drawIcon(document.getElementById('icon' + size));
    });
  </script>
</body>
</html>
